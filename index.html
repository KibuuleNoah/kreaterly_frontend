<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kreaterly | Africa's Premier Creator Infrastructure</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0a0b0e;
        color: #e2e8f0;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }
      .font-display {
        font-family: "Bebas Neue", cursive;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0b0e;
      }
      ::-webkit-scrollbar-thumb {
        background: #14b8a6;
        border-radius: 10px;
      }

      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      @keyframes slide-infinite {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .animate-slide-infinite {
        display: flex;
        width: max-content;
        animation: slide-infinite 40s linear infinite;
      }

      .animate-slide-infinite-reverse {
        display: flex;
        width: max-content;
        animation: slide-infinite 40s linear infinite reverse;
      }

      @keyframes slide-vertical {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-33.33%);
        }
      }
      .animate-slide-vertical {
        animation: slide-vertical 180s linear infinite;
      }
      .animate-slide-vertical-reverse {
        animation: slide-vertical 150s linear infinite reverse;
      }

      .btn-bubble {
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .btn-bubble:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .btn-bubble:active {
        transform: scale(0.96);
      }

      .glass-card {
        background: rgba(17, 20, 26, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .text-glow-teal {
        text-shadow: 0 0 20px rgba(20, 184, 166, 0.4);
      }
      .text-glow-orange {
        text-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
      }

      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
